<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #f5f0e8;
    --surface:    #efe9dc;
    --border:     #d9d0be;
    --text:       #2a2318;
    --text-sub:   #7a6e5e;
    --text-muted: #a89e8c;
    --accent:     #b85c00;
    --accent-dim: #e8823a;
    --green:      #4a7c3f;
    --red:        #9b2a1a;

  @keyframes pulse  { 0%, 100% { opacity: 1 } 50% { opacity: 0.35 } }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 13px;
  }

  .wrap { max-width: 720px; margin: 0 auto; padding: 1.5rem 1.25rem 5rem; }

  /* ---- header ---- */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.25rem;
  }
  .title-row { display: flex; align-items: center; gap: 8px; }
  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    position: relative; top: -1px;
    animation: pulse 2s ease-in-out infinite;
  }
  h1      { font-size: 13px; font-weight: 700; letter-spacing: 0.01em; color: var(--accent); }
  .sub    { font-size: 11px; color: var(--text-muted); margin-left: 6px; }
  .updated { font-size: 11px; color: var(--text-muted); }

  /* ---- stats row ---- */
  .stats {
    display: flex;
    gap: 2rem;
    margin-bottom: 1.1rem;
    padding-bottom: 0.9rem;
    border-bottom: 1px solid var(--border);
  }
  .stat { min-width: 0; overflow: hidden; }
  .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .stat-val   { font-size: 17px; font-weight: 600; color: var(--text); line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stat-val.hi  { color: var(--red); }
  .stat-val.sm  { font-size: 12px; font-weight: 500; }
  .stat-sub   { font-size: 10px; font-weight: 400; color: var(--text-muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ---- search + sort ---- */
  .search-wrap { display: flex; gap: 6px; margin-bottom: 1rem; }
  .search-wrap input {
    flex: 1; padding: 0.45rem 0.75rem;
    font-size: 12px; font-family: inherit;
    background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); outline: none;
  }
  .search-wrap input:focus       { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text-muted); }
  .sort-btn {
    padding: 0.45rem 0.75rem;
    font-size: 12px; font-family: inherit; white-space: nowrap;
    background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-sub); cursor: pointer; outline: none;
    transition: color 0.1s, border-color 0.1s;
  }
  .sort-btn:hover  { color: var(--text-sub); }
  .sort-btn.active { color: var(--accent); border-color: var(--accent); }

  /* ---- year tabs ---- */
  .years { display: flex; margin-bottom: 0.9rem; border-bottom: 1px solid var(--border); }
  .yr {
    font-size: 12px; color: var(--text-muted);
    padding: 0 0 0.5rem; margin-right: 1.25rem; margin-bottom: -1px;
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: color 0.1s;
  }
  .yr:hover  { color: var(--text-sub); }
  .yr.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  /* ---- incident list ---- */
  .list { display: flex; flex-direction: column; }

  a.row {
    display: grid;
    grid-template-columns: 2ch 1fr auto;
    gap: 0 12px;
    align-items: baseline;
    padding: 0.45rem 0;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: inherit;
    animation: fadeIn 0.15s ease both;
    transition: background 0.1s;
  }
  a.row:first-child { border-top: 1px solid var(--border); }
  a.row:hover {
    background: var(--surface);
    margin: 0 -0.75rem;
    padding-left: 0.75rem;
    padding-right: 0.75rem;
  }
  a.row:hover .row-name { color: var(--accent); }

  .row-num  { font-size: 11px; color: var(--text-muted); text-align: right; padding-top: 1px; }
  .row-body { min-width: 0; }
  .row-name { font-size: 13px; color: var(--text); line-height: 1.4; }
  .row-meta { display: flex; gap: 6px; margin-top: 2px; flex-wrap: wrap; align-items: center; }

  .meta-item        { font-size: 10px; color: var(--text-muted); }
  .meta-item.chain  { color: var(--text-sub); }
  .meta-item.vector { color: var(--accent-dim); }
  .meta-sep         { font-size: 10px; color: var(--border); }

  .row-right { text-align: right; white-space: nowrap; }
  .row-amt   { font-size: 12px; font-weight: 600; color: var(--red); }
  .row-amt.unknown { color: var(--text-muted); font-weight: 400; }
  .row-date  { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  /* ---- footer ---- */
  .status { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); padding-top: 0.6rem; }
  .empty  { padding: 3rem 0; text-align: center; color: var(--text-muted); }
  footer  { margin-top: 3rem; padding-top: 0.75rem; border-top: 1px solid var(--border); font-size: 10px; color: var(--text-muted); }

  @media (max-width: 480px) {
    .stats { gap: 1.2rem; flex-wrap: wrap; }
  }

<body>
<div class="wrap">

  <header>
    <div class="title-row">
      <h1>web3 hack tracker</h1>
      <span class="sub">click any row to open source</span>
    </div>
    <span class="updated" id="upd"></span>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">incidents</div>
      <div class="stat-val" id="sN">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">total lost</div>
      <div class="stat-val hi" id="sT">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">largest</div>
      <div class="stat-val hi" id="sL">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">most recent</div>
      <div class="stat-val sm" id="sR">—</div>
    </div>
  </div>

  <div class="search-wrap">
    <input id="search" type="text" placeholder="search incidents, chains, attack types…" oninput="applyFilters()">
    <button class="sort-btn" id="sortBtn" onclick="toggleSort()">sort by amount</button>
  </div>
  <div class="years" id="years"></div>
  <div class="list" id="list"><div class="empty">loading…</div></div>
  <div class="status"><span id="msg"></span></div>
  <footer>sources: <span id="srcs"></span></footer>

</div>
<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------

const $ = id => document.getElementById(id);

let allIncidents = [];
let activeYear   = null;
let sortByAmount = false;
let prevKeys     = new Set();

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------

function esc(s) {
  return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function sanitizeHref(url) {
  if (!url) return "#";
  try {
    const parsed = new URL(url);
    return (parsed.protocol === "https:" || parsed.protocol === "http:") ? url : "#";
  } catch { return "#"; }
}

function incidentKey(inc) {
  return (inc.name + inc.date).toLowerCase().replace(/\W/g, "");
}

function formatAmount(millions) {
  if (millions == null) return null;
  if (millions >= 1000) return "$" + (millions / 1000).toFixed(1) + "B";
  if (millions >= 1)    return "$" + millions.toFixed(1) + "M";
  return "$" + Math.round(millions * 1000) + "K";
}

function timeAgo(dateStr) {
  if (!dateStr) return "";
  const dt = new Date(dateStr.includes("T") ? dateStr : dateStr + "T00:00:00Z");
  const hoursAgo = Math.floor((Date.now() - dt) / 3.6e6);
  if (hoursAgo < 1)  return "just now";
  if (hoursAgo < 24) return hoursAgo + "h ago";
  return dt.toLocaleDateString("en-US", { month: "short", day: "numeric", timeZone: "UTC" });
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------

function renderYears(incidents) {
  const years = [...new Set(incidents.map(i => i.date?.slice(0, 4)).filter(Boolean))].sort((a, b) => b - a);
  if (!activeYear || !years.includes(activeYear)) activeYear = years[0];
  $("years").innerHTML = years.map(y =>
    `<span class="yr${y === activeYear ? " active" : ""}" onclick="setYear('${esc(y)}')">${esc(y)}</span>`
  ).join("");
}

function renderStats(incidents, mostRecent) {
  const withAmount = incidents.filter(i => i.amount);
  const total = withAmount.reduce((sum, i) => sum + i.amount, 0);
  const largest = withAmount.reduce((max, i) => i.amount > (max?.amount || 0) ? i : max, null);
  const recent = mostRecent || incidents[0];

  $("sN").innerHTML = `${incidents.length}<div class="stat-sub">${esc(activeYear || "")}</div>`;
  $("sT").innerHTML = `${esc(formatAmount(total) || "—")}<div class="stat-sub">&nbsp;</div>`;
  $("sL").innerHTML = largest
    ? `${esc(formatAmount(largest.amount))}<div class="stat-sub">${esc(largest.name.slice(0, 20) + (largest.name.length > 20 ? "…" : ""))}</div>`
    : "—";
  $("sR").innerHTML = recent
    ? `${esc(recent.name.slice(0, 22) + (recent.name.length > 22 ? "…" : ""))}<div class="stat-sub">${esc(timeAgo(recent.date))}</div>`
    : "—";
}

function renderList(incidents) {
  const newKeys = new Set(incidents.map(incidentKey).filter(k => !prevKeys.has(k)));
  incidents.forEach(i => prevKeys.add(incidentKey(i)));

  if (!incidents.length) {
    $("list").innerHTML = '<div class="empty">no incidents found</div>';
    return;
  }

  $("list").innerHTML = incidents.map((inc, idx) => {
    const amt = formatAmount(inc.amount);
    const metaParts = [
      inc.chain  && inc.chain  !== "—" ? `<span class="meta-item chain">${esc(inc.chain)}</span>`  : "",
      inc.vector && inc.vector !== "—" ? `<span class="meta-item vector">${esc(inc.vector)}</span>` : "",
      `<span class="meta-item">${esc(inc.source)}</span>`,
    ].filter(Boolean).join('<span class="meta-sep"> · </span>');

    return `<a href="${esc(sanitizeHref(inc.link))}" target="_blank" rel="noopener"
      class="row" style="animation-delay:${Math.min(idx * 0.015, 0.3)}s">
      <span class="row-num">${idx + 1}</span>
      <div class="row-body">
        <div class="row-name">${esc(inc.name)}</div>
        <div class="row-meta">${metaParts}</div>
      </div>
      <div class="row-right">
        <div class="row-amt ${amt ? "" : "unknown"}">${esc(amt || "unknown")}</div>
        <div class="row-date">${esc(timeAgo(inc.date))}</div>
      </div>
    </a>`;
  }).join("");
}

// ---------------------------------------------------------------------------
// Filtering + actions
// ---------------------------------------------------------------------------

function applyFilters() {
  const query = $("search").value.trim().toLowerCase();
  $("years").style.display = query ? "none" : "";

  let filtered = query
    ? allIncidents.filter(i =>
        i.name.toLowerCase().includes(query) ||
        (i.chain  || "").toLowerCase().includes(query) ||
        (i.vector || "").toLowerCase().includes(query) ||
        (i.source || "").toLowerCase().includes(query)
      )
    : allIncidents.filter(i => i.date?.startsWith(activeYear));

  const chronological = [...filtered].sort((a, b) => (b.date || "") > (a.date || "") ? 1 : -1);
  if (sortByAmount) filtered = [...filtered].sort((a, b) => (b.amount || 0) - (a.amount || 0));

  renderStats(filtered, chronological[0]);
  renderList(filtered);
  $("msg").textContent = filtered.length + " incidents" + (query ? ` matching "${query}"` : "");
}

function setYear(year) {
  activeYear = year;
  $("search").value = "";
  renderYears(allIncidents);
  applyFilters();
}

function toggleSort() {
  sortByAmount = !sortByAmount;
  $("sortBtn").classList.toggle("active", sortByAmount);
  applyFilters();
}

// ---------------------------------------------------------------------------
// Data loading
// ---------------------------------------------------------------------------

function load() {
  const data = window.__DATA__;
  if (!data) {
    $("list").innerHTML = `<div class="empty">data.js not found — run node fetch.mjs first</div>`;
    return;
  }

  allIncidents = data.incidents || [];
  $("upd").textContent = "updated " + new Date(data.updated).toLocaleDateString([], { month: "short", day: "numeric" });
  if (data.sources) {
    $("srcs").textContent = Object.entries(data.sources).map(([k, v]) => `${k} (${v})`).join(" · ");
  }

  renderYears(allIncidents);
  applyFilters();
}

load();
</script>
</body>
</html>
